<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0c0c1a">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.png">
<title>الجدول الدوري</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ══ RESET ══ */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none}
body{font-family:'Cairo',sans-serif;background:#0c0c1a;user-select:none;height:100dvh;}

/* ══ WORKSPACE ══ */
#workspace{
  position:fixed;inset:0;overflow:hidden;
  background:#0c0c1a;touch-action:none;
}

/* ══ BOARD ══ */
#board{
  position:absolute;
  background:transparent;
  transform-origin:0 0;
  overflow:visible;
}

/* ══ SQUARES ══ */
.sq{
  position:absolute;z-index:10;
  border:1px solid rgba(0,0,0,0.5);
  border-radius:0;
  cursor:pointer;
  transition:transform .12s ease;
  opacity:1;
}
.sq:active{transform:scale(0.97);}
/* revealed = transparent, but still clickable */
.sq.revealed{opacity:0;}

/* ══ SETTINGS BUTTON ══ */
#menu-btn{
  position:fixed;top:14px;right:14px;z-index:1000;
  width:46px;height:46px;border-radius:14px;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  color:#fff;font-size:21px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
#menu-btn:hover{background:rgba(0,0,0,.75);}
#menu-btn.open{transform:rotate(45deg);background:rgba(10,10,40,.9);}

/* ══ SETTINGS DRAWER ══ */
#menu-drawer{
  position:fixed;top:68px;right:14px;z-index:999;
  width:265px;border-radius:16px;
  background:rgba(8,8,22,.97);
  border:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  padding:12px 10px;
  display:none;flex-direction:column;gap:4px;
  box-shadow:0 16px 48px rgba(0,0,0,.75);
}
#menu-drawer.open{display:flex;}

.m-section{
  display:flex;flex-direction:column;gap:4px;
  padding:8px 0;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.m-section:last-child{border-bottom:none;padding-bottom:2px;}
.m-label{
  font-size:9px;font-weight:700;letter-spacing:.1em;
  color:rgba(255,255,255,.28);text-transform:uppercase;
  padding:0 4px 4px;
}
.m-btn{
  height:38px;width:100%;border-radius:9px;border:none;
  background:rgba(255,255,255,.06);color:#edeefa;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:8px;
  padding:0 12px;transition:background .15s;
}
.m-btn:hover{background:rgba(255,255,255,.13);}
.m-btn:active{background:rgba(255,255,255,.18);}
.m-btn .ic{flex-shrink:0;font-size:15px;}

/* action buttons */
.m-btn.reveal{background:rgba(0,212,255,.1);color:#00d4ff;}
.m-btn.reveal:hover{background:rgba(0,212,255,.2);}
.m-btn.cover{background:rgba(255,180,0,.08);color:#ffd060;}
.m-btn.cover:hover{background:rgba(255,180,0,.18);}
.m-btn.import-btn{background:rgba(0,212,255,.08);color:#00d4ff;
  border:1px dashed rgba(0,212,255,.35);}
.m-btn.import-btn:hover{background:rgba(0,212,255,.18);}

/* ── SWITCH ROW ── */
.sw-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 4px;
}
.sw-row span{font-size:13px;color:#ccd;font-weight:600;}
.sw{position:relative;width:46px;height:26px;flex-shrink:0;}
.sw input{opacity:0;width:0;height:0;position:absolute;}
.sw-track{
  position:absolute;inset:0;border-radius:13px;
  background:rgba(255,255,255,.15);
  transition:background .22s;cursor:pointer;
}
.sw input:checked+.sw-track{background:#00d4ff;}
.sw-track::after{
  content:'';position:absolute;top:4px;left:4px;
  width:18px;height:18px;border-radius:50%;
  background:#fff;transition:transform .22s;
  box-shadow:0 1px 5px rgba(0,0,0,.35);
}
.sw input:checked+.sw-track::after{transform:translateX(20px);}

/* ── IMPORT STATUS ── */
#import-status{
  font-size:10px;color:rgba(0,212,255,.6);
  padding:2px 4px;display:none;
}

/* ══ POPUP ══ */
#pop-overlay{
  position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
  padding:16px;
}
#pop-overlay.open{display:flex;}

#pop-box{
  position:relative;width:100%;max-width:390px;
  background:rgba(10,10,28,.98);
  border:1px solid rgba(255,255,255,.13);
  border-radius:20px;overflow:hidden;
  display:flex;flex-direction:column;
  max-height:88vh;
  box-shadow:0 24px 64px rgba(0,0,0,.85);
}

#pop-close{
  position:absolute;top:10px;left:10px;z-index:10;
  width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.12);border:none;
  color:#fff;font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s;
}
#pop-close:hover{background:rgba(255,59,48,.5);}

#pop-img-wrap{
  width:100%;aspect-ratio:4/3;
  background:#0a0a18;flex-shrink:0;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
#pop-img{width:100%;height:100%;object-fit:contain;display:none;}
#pop-img-ph{font-size:48px;opacity:.18;}

#pop-info{
  flex:1;overflow-y:auto;padding:18px 18px 22px;
  scrollbar-width:thin;
  scrollbar-color:rgba(255,255,255,.12) transparent;
}
#pop-info::-webkit-scrollbar{width:3px;}
#pop-info::-webkit-scrollbar-thumb{
  background:rgba(255,255,255,.14);border-radius:2px;
}

#pop-title{
  font-size:17px;font-weight:800;color:#edeefa;
  margin-bottom:10px;line-height:1.4;
}
#pop-body{
  font-size:13px;color:rgba(255,255,255,.62);
  line-height:1.85;white-space:pre-wrap;
}
#pop-nodata{
  font-size:13px;color:rgba(255,255,255,.25);
  text-align:center;padding:24px 0;display:none;
}

/* ══ ZOOM INDICATOR ══ */
#zoom-ind{
  position:fixed;bottom:12px;left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,.78);color:rgba(255,255,255,.62);
  padding:3px 14px;border-radius:20px;
  font-size:11px;font-weight:600;letter-spacing:.04em;
  pointer-events:none;z-index:900;
  opacity:0;transition:opacity .4s;
}
#zoom-ind.show{opacity:1;}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:rgba(10,10,28,.97);border:1px solid rgba(255,255,255,.1);
  color:#edeefa;padding:9px 22px;border-radius:12px;
  font-size:13px;font-weight:600;z-index:9999;
  opacity:0;transition:opacity .22s,transform .28s cubic-bezier(.34,1.56,.64,1);
  backdrop-filter:blur(20px);pointer-events:none;
  white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- WORKSPACE -->
<div id="workspace">
  <div id="board" dir="ltr"></div>
</div>

<!-- ZOOM INDICATOR -->
<div id="zoom-ind">100%</div>

<!-- SETTINGS BUTTON -->
<button id="menu-btn" title="الإعدادات">⚙</button>

<!-- SETTINGS DRAWER -->
<div id="menu-drawer">

  <!-- Cover / Reveal -->
  <div class="m-section">
    <div class="m-label">التغطية والكشف</div>
    <button class="m-btn reveal" id="btn-reveal">
      <span class="ic">👁</span> كشف جميع المربعات
    </button>
    <button class="m-btn cover" id="btn-cover">
      <span class="ic">🫣</span> تغطية جميع المربعات
    </button>
  </div>

  <!-- Options -->
  <div class="m-section">
    <div class="m-label">الخيارات</div>
    <div class="sw-row">
      <span>تثبيت الشاشة (قفل التحريك)</span>
      <label class="sw">
        <input type="checkbox" id="sw-lock">
        <div class="sw-track"></div>
      </label>
    </div>
    <div class="sw-row">
      <span>نافذة المعلومات عند الكشف</span>
      <label class="sw">
        <input type="checkbox" id="sw-popup" checked>
        <div class="sw-track"></div>
      </label>
    </div>
  </div>

  <!-- Data import -->
  <div class="m-section">
    <div class="m-label">بيانات المعلومات</div>
    <button class="m-btn import-btn" id="btn-import">
      <span class="ic">📂</span> استيراد ملف JSON
    </button>
    <input type="file" id="import-file" accept=".json,application/json" hidden>
    <div id="import-status"></div>
  </div>

  <!-- View -->
  <div class="m-section">
    <div class="m-label">العرض</div>
    <button class="m-btn" id="btn-bg">
      <span class="ic">🖼</span> تحميل صورة خلفية
    </button>
    <input type="file" id="bg-file" accept="image/*" hidden>
    <button class="m-btn" id="btn-rotate">
      <span class="ic">⟳</span> تدوير الشاشة 270°
    </button>
    <button class="m-btn" id="btn-center">
      <span class="ic">⊡</span> توسيط وإعادة الحجم
    </button>
  </div>

</div>

<!-- INFO POPUP -->
<div id="pop-overlay">
  <div id="pop-box">
    <button id="pop-close">✕</button>
    <div id="pop-img-wrap">
      <img id="pop-img" alt="">
      <div id="pop-img-ph">🔬</div>
    </div>
    <div id="pop-info">
      <div id="pop-title"></div>
      <div id="pop-body"></div>
      <div id="pop-nodata">لا توجد بيانات لهذا المربع</div>
    </div>
  </div>
</div>

<script>
'use strict';

/* ══════════════════════════════════════
   GRID — from My_drawing.xml (VP 240×344)
   ci=6,ri=1 removed (extra square beside H)
══════════════════════════════════════ */
const VP_W=240, VP_H=344;
const COL_XS=[68.10,86.41,105.26,123.93,142.43,160.87,179.39,197.18];
const ROW_YS=[6.24,24.13,41.96,59.95,77.77,95.57,113.48,131.62,
  149.50,167.32,185.14,202.87,220.69,238.62,256.40,274.38,292.33,310.03,327.68];

const VALID_CELLS=new Set();
(function(){
  function a(c0,c1,r0,r1){
    for(let c=c0;c<=c1;c++)
      for(let r=r0;r<=r1;r++){
        if(c===6&&r===1) continue; // remove extra cell
        VALID_CELLS.add(`${c},${r}`);
      }
  }
  a(0,6,0,1); a(0,3,2,2); a(1,3,3,3); a(1,3,4,11); a(1,5,12,16); a(1,6,17,17);
})();

/* ══════════════════════════════════════
   PRESET COLORS (from preset.json)
   Hydrogen ci=6,ri=0 → yellow #EAD800
══════════════════════════════════════ */
const PRESET=[
  {ci:2,ri:6,color:"#86D5F1"},{ci:0,ri:0,color:"#86D5F1"},
  {ci:5,ri:12,color:"#9DD45B"},{ci:1,ri:12,color:"#86D5F1"},
  {ci:2,ri:9,color:"#86D5F1"},{ci:3,ri:3,color:"#86D5F1"},
  {ci:5,ri:0,color:"#86D5F1"},{ci:4,ri:1,color:"#86D5F1"},
  {ci:2,ri:1,color:"#86D5F1"},{ci:3,ri:4,color:"#86D5F1"},
  {ci:2,ri:3,color:"#86D5F1"},{ci:1,ri:16,color:"#9DD45B"},
  {ci:1,ri:15,color:"#9DD45B"},{ci:2,ri:5,color:"#86D5F1"},
  {ci:2,ri:12,color:"#86D5F1"},{ci:4,ri:12,color:"#86D5F1"},
  {ci:0,ri:1,color:"#86D5F1"},{ci:1,ri:4,color:"#86D5F1"},
  {ci:3,ri:5,color:"#86D5F1"},{ci:4,ri:0,color:"#86D5F1"},
  {ci:1,ri:7,color:"#86D5F1"},{ci:3,ri:8,color:"#86D5F1"},
  {ci:1,ri:1,color:"#86D5F1"},{ci:1,ri:6,color:"#86D5F1"},
  {ci:4,ri:13,color:"#9DD45B"},{ci:1,ri:2,color:"#86D5F1"},
  {ci:3,ri:9,color:"#86D5F1"},{ci:3,ri:7,color:"#86D5F1"},
  {ci:3,ri:0,color:"#86D5F1"},{ci:2,ri:10,color:"#86D5F1"},
  {ci:3,ri:10,color:"#86D5F1"},{ci:2,ri:4,color:"#86D5F1"},
  {ci:1,ri:8,color:"#86D5F1"},{ci:0,ri:2,color:"#86D5F1"},
  {ci:2,ri:2,color:"#86D5F1"},{ci:3,ri:1,color:"#86D5F1"},
  {ci:1,ri:11,color:"#86D5F1"},{ci:3,ri:11,color:"#86D5F1"},
  {ci:3,ri:6,color:"#86D5F1"},{ci:1,ri:3,color:"#86D5F1"},
  {ci:1,ri:9,color:"#86D5F1"},{ci:2,ri:7,color:"#86D5F1"},
  {ci:2,ri:0,color:"#86D5F1"},{ci:2,ri:15,color:"#9DD45B"},
  {ci:1,ri:0,color:"#86D5F1"},{ci:3,ri:13,color:"#9DD45B"},
  {ci:6,ri:0,color:"#EAD800"},/* Hydrogen — yellow */
  {ci:2,ri:8,color:"#86D5F1"},{ci:3,ri:12,color:"#86D5F1"},
  {ci:3,ri:2,color:"#86D5F1"},{ci:3,ri:14,color:"#9DD45B"},
  {ci:2,ri:11,color:"#86D5F1"},{ci:1,ri:10,color:"#86D5F1"},
  {ci:2,ri:14,color:"#9DD45B"},{ci:1,ri:5,color:"#86D5F1"},
  {ci:5,ri:1,color:"#86D5F1"},{ci:1,ri:13,color:"#86D5F1"},
  {ci:6,ri:17,color:"#EAD800"},{ci:1,ri:14,color:"#86D5F1"},
  {ci:4,ri:14,color:"#EAD800"},{ci:5,ri:15,color:"#EAD800"},
  {ci:5,ri:13,color:"#EAD800"},{ci:2,ri:13,color:"#86D5F1"},
  {ci:5,ri:16,color:"#EAD800"},{ci:5,ri:17,color:"#EAD800"},
  {ci:4,ri:15,color:"#EAD800"},{ci:4,ri:16,color:"#EAD800"},
  {ci:5,ri:14,color:"#EAD800"},{ci:4,ri:17,color:"#EAD800"},
  {ci:3,ri:17,color:"#EAD800"},{ci:2,ri:16,color:"#EAD800"},
  {ci:2,ri:17,color:"#EAD800"},{ci:1,ri:17,color:"#EAD800"},
  {ci:3,ri:16,color:"#EAD800"},{ci:3,ri:15,color:"#EAD800"}
].filter(p=>VALID_CELLS.has(`${p.ci},${p.ri}`));

/* ══════════════════════════════════════
   STATE
══════════════════════════════════════ */
let S={
  rotDeg:0,
  bgDataUrl:null, bgW:null, bgH:null,
  squares: PRESET.map((p,i)=>({id:String(i),ci:p.ci,ri:p.ri,color:p.color,revealed:false})),
  infoData:{},
  locked:false,
};

/* ══════════════════════════════════════
   TRANSFORM
══════════════════════════════════════ */
let T={tx:0,ty:0,scale:1,rot:0};
let natW=0,natH=0,fitSc=1;
const MAX_SC=8;

/* ══════════════════════════════════════
   DOM REFS
══════════════════════════════════════ */
const workspace =document.getElementById('workspace');
const board     =document.getElementById('board');
const menuBtn   =document.getElementById('menu-btn');
const menuDrawer=document.getElementById('menu-drawer');
const swLock    =document.getElementById('sw-lock');
const swPopup   =document.getElementById('sw-popup');
const btnReveal =document.getElementById('btn-reveal');
const btnCover  =document.getElementById('btn-cover');
const btnImport =document.getElementById('btn-import');
const importFile=document.getElementById('import-file');
const importSt  =document.getElementById('import-status');
const btnBg     =document.getElementById('btn-bg');
const bgFile    =document.getElementById('bg-file');
const btnRotate =document.getElementById('btn-rotate');
const btnCenter =document.getElementById('btn-center');
const popOverlay=document.getElementById('pop-overlay');
const popClose  =document.getElementById('pop-close');
const popImg    =document.getElementById('pop-img');
const popImgPh  =document.getElementById('pop-img-ph');
const popTitle  =document.getElementById('pop-title');
const popBody   =document.getElementById('pop-body');
const popNodata =document.getElementById('pop-nodata');
const zoomInd   =document.getElementById('zoom-ind');

/* ══════════════════════════════════════
   GRID HELPERS
══════════════════════════════════════ */
function vx(v,bW){return(v/VP_W)*bW;}
function vy(v,bH){return(v/VP_H)*bH;}
function cellRect(ci,ri){
  const bW=board.clientWidth, bH=board.clientHeight;
  return{
    x:vx(COL_XS[ci],bW), y:vy(ROW_YS[ri],bH),
    w:vx(COL_XS[ci+1]-COL_XS[ci],bW),
    h:vy(ROW_YS[ri+1]-ROW_YS[ri],bH)
  };
}

/* ══════════════════════════════════════
   BOARD SIZING & TRANSFORM
   CSS order: translate → scale → rotate
   For rotate(270°):
     displayed bbox = natH × natW
     T.ty += natW*scale  (compensates negative-y shift)
══════════════════════════════════════ */
function fitBoard(){
  const wW=workspace.clientWidth, wH=workspace.clientHeight;
  const imgW=S.bgW||(VP_W*6.2), imgH=S.bgH||(VP_H*6.2);
  const ratio=imgW/imgH;
  if(wW/wH>ratio){natH=wH;natW=natH*ratio;}
  else{natW=wW;natH=natW/ratio;}
  board.style.width=natW+'px';
  board.style.height=natH+'px';
  if(S.bgDataUrl){
    board.style.backgroundImage=`url(${S.bgDataUrl})`;
    board.style.backgroundSize='100% 100%';
  }
  centerTransform();
}

function centerTransform(){
  const wW=workspace.clientWidth, wH=workspace.clientHeight;
  T.rot=S.rotDeg;
  const is270=(T.rot===270);
  const dispW=is270?natH:natW;
  const dispH=is270?natW:natH;
  fitSc=Math.min(wW/dispW, wH/dispH);
  T.scale=fitSc;
  if(is270){
    T.tx=(wW-natH*T.scale)/2;
    T.ty=(wH-natW*T.scale)/2 + natW*T.scale;
  } else {
    T.tx=(wW-natW*T.scale)/2;
    T.ty=(wH-natH*T.scale)/2;
  }
  applyT();
}

function applyT(){
  board.style.transform=
    `translate(${T.tx}px,${T.ty}px) scale(${T.scale}) rotate(${T.rot}deg)`;
  board.style.transformOrigin='0 0';
}

function clampPan(){
  const wW=workspace.clientWidth, wH=workspace.clientHeight;
  const m=80, s=T.scale;
  if(T.rot===270){
    const rw=natH*s, rh=natW*s;
    T.tx=clamp(T.tx, m-rw, wW-m);
    const top=T.ty-rh;
    T.ty=clamp(top, m-rh, wH-m)+rh;
  } else {
    T.tx=clamp(T.tx, m-natW*s, wW-m);
    T.ty=clamp(T.ty, m-natH*s, wH-m);
  }
}

function showZoom(){
  zoomInd.textContent=Math.round(T.scale*100)+'%';
  zoomInd.classList.add('show');
  clearTimeout(zoomInd._t);
  zoomInd._t=setTimeout(()=>zoomInd.classList.remove('show'),1100);
}

/* ══════════════════════════════════════
   RENDER SQUARES
   revealed=false → square SHOWS (covered)
   revealed=true  → square HIDDEN (uncovered, shows bg)
══════════════════════════════════════ */
function renderSquares(){
  document.querySelectorAll('.sq').forEach(el=>el.remove());
  S.squares.forEach(sq=>{
    const{x,y,w,h}=cellRect(sq.ci,sq.ri);
    const el=document.createElement('div');
    el.className='sq'+(sq.revealed?' revealed':'');
    el.style.cssText=
      `left:${x}px;top:${y}px;width:${w}px;height:${h}px;background:${sq.color};`;
    el.addEventListener('click',()=>onSquareClick(sq,el));
    board.appendChild(el);
  });
}

/* ══════════════════════════════════════
   SQUARE CLICK — toggle cover/reveal
══════════════════════════════════════ */
function onSquareClick(sq,el){
  sq.revealed=!sq.revealed;
  el.classList.toggle('revealed', sq.revealed);
  // Show popup when revealing (uncovering)
  if(sq.revealed && swPopup.checked) showPopup(sq);
}

/* ══════════════════════════════════════
   POPUP
══════════════════════════════════════ */
function showPopup(sq){
  const data=S.infoData[`${sq.ci},${sq.ri}`];
  if(data && data.imgUrl){
    popImg.src=data.imgUrl;
    popImg.style.display='block';
    popImgPh.style.display='none';
  } else {
    popImg.style.display='none';
    popImg.src='';
    popImgPh.style.display='block';
  }
  if(data){
    popTitle.textContent=data.title||`خلية (${sq.ci},${sq.ri})`;
    popBody.textContent=data.body||data.text||'';
    popNodata.style.display='none';
  } else {
    popTitle.textContent=`خلية (${sq.ci},${sq.ri})`;
    popBody.textContent='';
    popNodata.style.display='block';
  }
  popOverlay.classList.add('open');
}

function closePopup(){
  popOverlay.classList.remove('open');
  popImg.src='';
}

/* ══════════════════════════════════════
   IMPORT INFO JSON
   Format: [{ci,ri,title,body,imgUrl}, ...]
══════════════════════════════════════ */
function handleImport(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const arr=JSON.parse(ev.target.result);
      if(!Array.isArray(arr)) throw new Error();
      S.infoData={};
      let n=0;
      arr.forEach(item=>{
        if(item.ci!==undefined && item.ri!==undefined){
          S.infoData[`${item.ci},${item.ri}`]={
            title:item.title||'',
            body: item.body||item.text||item.description||'',
            imgUrl:item.imgUrl||item.image||null
          };
          n++;
        }
      });
      importSt.textContent=`✅ ${n} سجل تم تحميله`;
      importSt.style.display='block';
      toast(`✅ تم استيراد ${n} سجل`);
    }catch{
      importSt.textContent='❌ خطأ في تنسيق الملف';
      importSt.style.display='block';
      toast('❌ خطأ في قراءة الملف');
    }
  };
  reader.readAsText(file);
  e.target.value='';
}

/* ══════════════════════════════════════
   PINCH ZOOM — focal point stays fixed
   between fingers (PDF-style smooth zoom)
══════════════════════════════════════ */
let pinch=null;

function onPinchStart(e){
  if(e.touches.length<2) return;
  e.preventDefault();
  const t0=e.touches[0], t1=e.touches[1];
  pinch={
    d:   Math.hypot(t0.clientX-t1.clientX, t0.clientY-t1.clientY),
    cx:  (t0.clientX+t1.clientX)/2,
    cy:  (t0.clientY+t1.clientY)/2,
    sc0: T.scale,   // scale at pinch start
    tx0: T.tx, ty0: T.ty
  };
}

function onPinchMove(e){
  if(!pinch||e.touches.length<2) return;
  e.preventDefault();
  const t0=e.touches[0], t1=e.touches[1];
  const d=Math.hypot(t0.clientX-t1.clientX, t0.clientY-t1.clientY);
  const cx=(t0.clientX+t1.clientX)/2;
  const cy=(t0.clientY+t1.clientY)/2;

  // Scale relative to START (avoids drift)
  const newSc=clamp(pinch.sc0*(d/pinch.d), fitSc, MAX_SC);
  const sf=newSc/pinch.sc0;
  // Keep focal point (initial midpoint) fixed in screen space
  T.tx=pinch.cx - (pinch.cx-pinch.tx0)*sf + (cx-pinch.cx);
  T.ty=pinch.cy - (pinch.cy-pinch.ty0)*sf + (cy-pinch.cy);
  T.scale=newSc;

  clampPan();
  applyT();
  showZoom();
}

function onPinchEnd(){ pinch=null; }

/* ══════════════════════════════════════
   WHEEL ZOOM
══════════════════════════════════════ */
function onWheel(e){
  e.preventDefault();
  const rect=workspace.getBoundingClientRect();
  const cx=e.clientX-rect.left, cy=e.clientY-rect.top;
  const factor=e.deltaY<0?1.12:0.89;
  const newSc=clamp(T.scale*factor, fitSc, MAX_SC);
  if(newSc===T.scale) return;
  const sf=newSc/T.scale;
  T.tx=cx-(cx-T.tx)*sf;
  T.ty=cy-(cy-T.ty)*sf;
  T.scale=newSc;
  clampPan();
  applyT();
  showZoom();
}

/* ══════════════════════════════════════
   PAN
══════════════════════════════════════ */
let panSt=null;

function onPanStart(e){
  if(S.locked) return;
  if(e.target.closest('.sq')) return;
  if(e.touches && e.touches.length>=2) return;
  const p=getXY(e);
  panSt={px:p.x, py:p.y, tx:T.tx, ty:T.ty};
}
function onPanMove(e){
  if(!panSt||pinch) return;
  const p=getXY(e);
  T.tx=panSt.tx+(p.x-panSt.px);
  T.ty=panSt.ty+(p.y-panSt.py);
  clampPan();
  applyT();
}
function onPanEnd(){ panSt=null; }

/* ══════════════════════════════════════
   MENU
══════════════════════════════════════ */
function toggleMenu(){
  const open=menuDrawer.classList.toggle('open');
  menuBtn.classList.toggle('open', open);
}
function closeMenu(){
  menuDrawer.classList.remove('open');
  menuBtn.classList.remove('open');
}

/* ══════════════════════════════════════
   TOAST
══════════════════════════════════════ */
let toastTid;
function toast(msg){
  let el=document.querySelector('.toast');
  if(el){clearTimeout(toastTid);el.remove();}
  el=document.createElement('div');
  el.className='toast';
  el.textContent=msg;
  document.body.appendChild(el);
  requestAnimationFrame(()=>requestAnimationFrame(()=>el.classList.add('show')));
  toastTid=setTimeout(()=>{
    el.classList.remove('show');
    setTimeout(()=>el.remove(),300);
  },2400);
}

function getXY(e){
  const s=(e.touches&&e.touches[0])||(e.changedTouches&&e.changedTouches[0])||e;
  return{x:s.clientX, y:s.clientY};
}
function clamp(v,lo,hi){return Math.max(lo,Math.min(v,hi));}

/* ══════════════════════════════════════
   BIND EVENTS
══════════════════════════════════════ */
function bindEvents(){
  // Menu toggle
  menuBtn.addEventListener('click',e=>{e.stopPropagation();toggleMenu();});
  document.addEventListener('click',e=>{
    if(!menuDrawer.contains(e.target)&&e.target!==menuBtn) closeMenu();
  });

  // Cover / Reveal all
  btnReveal.addEventListener('click',()=>{
    S.squares.forEach(s=>s.revealed=true);
    renderSquares(); closeMenu();
    toast('👁 تم كشف جميع المربعات');
  });
  btnCover.addEventListener('click',()=>{
    S.squares.forEach(s=>s.revealed=false);
    renderSquares(); closeMenu();
    toast('🫣 تم تغطية جميع المربعات');
  });

  // Switches
  swLock.addEventListener('change',()=>{
    S.locked=swLock.checked;
    toast(S.locked?'🔒 تم قفل التحريك':'🔓 تم فتح التحريك');
  });
  swPopup.addEventListener('change',()=>{
    toast(swPopup.checked?'💬 نافذة المعلومات مفعّلة':'🔕 نافذة المعلومات معطّلة');
  });

  // Import
  btnImport.addEventListener('click',()=>importFile.click());
  importFile.addEventListener('change',handleImport);

  // Background
  btnBg.addEventListener('click',()=>bgFile.click());
  bgFile.addEventListener('change',e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        S.bgW=img.naturalWidth; S.bgH=img.naturalHeight;
        S.bgDataUrl=ev.target.result;
        fitBoard();
        toast('🖼 تم تحميل الصورة');
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value='';
  });

  // Rotation
  btnRotate.addEventListener('click',()=>{
    S.rotDeg=S.rotDeg===0?270:0;
    fitBoard(); renderSquares(); closeMenu();
    toast(S.rotDeg===270?'↻ تدوير 270°':'↺ اتجاه أصلي');
  });

  // Reset zoom
  btnCenter.addEventListener('click',()=>{
    centerTransform(); showZoom(); closeMenu();
    toast('⊡ تم التوسيط');
  });

  // Popup close
  popClose.addEventListener('click',closePopup);
  popOverlay.addEventListener('click',e=>{
    if(e.target===popOverlay) closePopup();
  });

  // Touch: pinch zoom
  workspace.addEventListener('touchstart',e=>{
    if(e.touches.length>=2){ onPinchStart(e); }
    else{ onPanStart(e); }
  },{passive:false});
  workspace.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length>=2){ onPinchMove(e); }
    else{ onPanMove(e); }
  },{passive:false});
  workspace.addEventListener('touchend',e=>{
    if(e.touches.length<2) onPinchEnd();
    onPanEnd();
  });

  // Mouse pan
  workspace.addEventListener('mousedown',onPanStart);
  document.addEventListener('mousemove',onPanMove);
  document.addEventListener('mouseup',onPanEnd);

  // Wheel zoom
  workspace.addEventListener('wheel',onWheel,{passive:false});
}

/* ══════════════════════════════════════
   PWA — Service Worker
══════════════════════════════════════ */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js')
      .then(r=>console.log('✅ SW registered:',r.scope))
      .catch(e=>console.warn('SW failed:',e));
  });
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
window.addEventListener('load',()=>{
  fitBoard();
  renderSquares();
  bindEvents();
});
window.addEventListener('resize',()=>{
  fitBoard();
  renderSquares();
});
</script>
